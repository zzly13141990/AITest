mcp:
  server-name: sqlserver-mcp-test
  server-version: 1.0.0-test
  transport: stdio

database:
  schema-load-timeout: 3s
  schema-cache-max-tables: 500
  sources:
    - name: testdb
      host: 127.0.0.1
      port: 1433
      database: sup
      username: sa
      password: "zz"
      min-pool-size: 1
      max-pool-size: 2
      connection-timeout: 5s
      max-lifetime: 5m
      leak-detection-threshold: 60s

llm:
  api-base-url: https://api.test.com/v1
  model: test-model
  temperature: 0.1
  max-tokens: 2000
  timeout: 5s
  max-retries: 1
  retry-delays:
    - 100ms

query:
  default-page-size: 10
  max-page-size: 100
  max-rows-total: 1000
  max-result-bytes: 1048576
  features:
    result-meaning-validation: false

observability:
  metrics:
    enabled: false
    jmx-enabled: false
  tracing:
    enabled: false
    endpoint: ""
  logging:
    level: WARN
    audit-log-path: ./target/test-audit
