mcp:
  server-name: sqlserver-mcp
  server-version: 1.0.0
  # Available: stdio (subprocess, best for Claude Code), sse (legacy HTTP), streamable-http (modern HTTP)
  transport: stdio
  port: 8080

database:
  schema-load-timeout: 3s
  schema-cache-max-tables: 500
  sources:
    - name: OES
      host: localhost
      port: 1433
      database: OESCQET-0408
      username: sa
      password: "zz"
      min-pool-size: 2
      max-pool-size: 10
      connection-timeout: 5s
      max-lifetime: 30m
      leak-detection-threshold: 60s

llm:
  api-base-url: https://api.deepseek.com/v1
  model: deepseek-v4-flash
  api-key: "sk-28d13dfd768e448491e805e6f6625ce7"
  temperature: 0.1
  max-tokens: 2000
  timeout: 30s
  max-retries: 3
  retry-delays:
    - 1s
    - 3s
    - 9s

query:
  default-page-size: 100
  max-page-size: 10000
  max-rows-total: 100000
  max-result-bytes: 52428800
  features:
    result-meaning-validation: true

observability:
  metrics:
    enabled: true
    jmx-enabled: false
  tracing:
    enabled: false
    endpoint: ""
  logging:
    level: INFO
    audit-log-path: ./logs/audit
    query-log-path: ./logs/query
    result-log-path: ./logs/result
    error-log-path: ./logs/error