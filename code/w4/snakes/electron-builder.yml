appId: com.snakegame.app
productName: 贪吃蛇对战
directories:
  output: release
files:
  - dist/**/*
  - backend/dist/**/*
  - package.json
  - electron-main.cjs
  - electron-preload.cjs
win:
  target:
    - nsis
    - portable
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
